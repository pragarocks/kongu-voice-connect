name: Fetch News and Deploy

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:          # Allow manual runs from the Actions tab

# Prevent two deploy runs from colliding on GitHub Pages
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit updated JSON files back
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and rewrite news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/fetch-news.cjs

      # Commit the refreshed JSON files so future runs can deduplicate properly.
      # Uses GITHUB_TOKEN — this push intentionally does NOT re-trigger deploy.yml
      # because the deploy happens below in the same run.
      - name: Commit updated news JSON
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/news/
          if git diff --staged --quiet; then
            echo "No news changes — nothing to commit"
          else
            git commit -m "chore: auto-update news $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Build Vite site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
