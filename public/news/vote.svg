<svg width="1600" height="900" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGradient)"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="250" height="900" fill="#dc3545" opacity="0.15"/>
  
  <!-- Right accent bar -->
  <rect x="1350" y="0" width="250" height="900" fill="#0096ff" opacity="0.15"/>
  
  <!-- Decorative shapes - top left -->
  <circle cx="150" cy="80" r="40" fill="#ff6b6b" opacity="0.2"/>
  <circle cx="280" cy="120" r="25" fill="#4ecdc4" opacity="0.2"/>
  
  <!-- Decorative circles voting theme - right side -->
  <circle cx="1250" cy="450" r="220" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
  <circle cx="1250" cy="450" r="160" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  <circle cx="1250" cy="450" r="100" fill="none" stroke="#4ade80" stroke-width="4" opacity="0.9" filter="url(#glow)"/>
  
  <!-- Checkmark symbol inside circle -->
  <g stroke="#4ade80" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <polyline points="1160,450 1220,520 1340,360"/>
  </g>
  
  <!-- Main headline -->
  <text x="100" y="180" font-family="Arial, Helvetica, sans-serif" font-size="130" font-weight="bold" fill="#ffffff" letter-spacing="3" text-anchor="start">ELECTION</text>
  <text x="100" y="310" font-family="Arial, Helvetica, sans-serif" font-size="130" font-weight="bold" fill="#ffffff" letter-spacing="3" text-anchor="start">RESULTS</text>
  
  <!-- Subtitle -->
  <text x="100" y="410" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="500" fill="#e0e0e0" text-anchor="start">Kongu Region 2026</text>
  
  <!-- Date with emphasis -->
  <text x="100" y="490" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#64b5f6" text-anchor="start">April 25, 2026</text>
  
  <!-- Decorative line accent -->
  <line x1="100" y1="535" x2="580" y2="535" stroke="#4ade80" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <line x1="100" y1="535" x2="350" y2="535" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Tagline -->
  <text x="100" y="650" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="400" fill="#b0bec5" text-anchor="start">Live Updates • 8 Districts • Real-time Coverage</text>
  
  <!-- Breaking news badge -->
  <rect x="100" y="730" width="300" height="90" rx="12" ry="12" fill="none" stroke="#4ade80" stroke-width="3" opacity="0.85"/>
  <text x="300" y="785" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#4ade80" text-anchor="middle">BREAKING NEWS</text>
  
  <!-- Additional decorative element - top right stats indicator -->
  <circle cx="1500" cy="100" r="35" fill="#0096ff" opacity="0.15"/>
  <text x="1500" y="115" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0096ff" text-anchor="middle" opacity="0.7">📊</text>
</svg>