<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>The Kongu Times</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect.
      // Converts /coimbatore -> /?/coimbatore so index.html can restore the route.
      // See: https://github.com/rafgraph/spa-github-pages
      (function () {
        var pathSegmentsToKeep = 0; // 0 for custom domain / user site; set to 1 for project pages
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
